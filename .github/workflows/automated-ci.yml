name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint-format:
    uses: ./.github/workflows/lint-format.yml
  test-unit:
    uses: ./.github/workflows/test-unit.yml
  rule-tester:
    if: github.event.action == 'opened'
    uses: ./.github/workflows/rule-tester.yml
    secrets: inherit
    with:
      environment: DEV
  test-rule-editor-preview:
    if: github.event.action == 'opened'
    needs: rule-tester
    uses: ./.github/workflows/test-rule-editor-preview.yml
    secrets: inherit
    with:
      pr_ref: ${{ github.event.pull_request.head.sha }}
