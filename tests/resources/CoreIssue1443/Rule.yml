Check:
  all:
    - name: define_variable_ccode
      operator: empty
    - name: define_vlm_has_codelist_any
      operator: equal_to
      value: true
Core:
  Id: CDISC.SENDIG.49
  Status: Draft
  Version: '1'
Description: 'For a variable identified in the SENDIG as being subject to CDISC
  published Controlled Terminology, the Codelist listed in the Define-XML
  document must properly reference the Controlled Terminology Codelist used.'
Executability: Fully Executable
Outcome:
  Message: 'As a controlled terminology codelist exists for the variable in the SEND
   domain, the codelist must be referenced for the variable in the define.xml'
  Output Variables:
    - variable_name
    - define_variable_ccode
    - library_variable_ccode
    - define_vlm_ccodes
    - define_vlm_ccode_matches_library_any

Rule Type: Variable Metadata Check against Define XML and Library Metadata
Scope:
  Domains:
    Include:
      - ALL
  Classes:
    Include:
      - ALL
Sensitivity: Record
