name: Merge Schema with Markdown Descriptions

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "resources/schema/rule/**"
  push:
    paths:
      - "resources/schema/rule/**"
    branches:
      - main

jobs:
  merge-schema-markdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo (PR)
        uses: actions/checkout@v6
        if: github.event_name == 'pull_request'
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Checkout repo (branch)
        uses: actions/checkout@v6
        if: github.event_name != 'pull_request'
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run schema markdown merge script
        run: |
          python scripts/merge_schema_markdown.py
      - uses: actions/setup-node@v6
      - name: Run Prettier to format merged schema files
        run: |
          npm i prettier
          npx prettier resources/schema/rule-merged/*.json --write
      - name: Commit and push the merged schema files to the current branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@cdisc.org
          git add resources/schema/rule-merged
          git diff-index --quiet HEAD || git commit -m "Update merged schema files with markdown descriptions"
          git push
