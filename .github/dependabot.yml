version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 3
    schedule:
      interval: "daily"
    cooldown:
      default-days: 14 # used to protect against package tainting attacks
  - package-ecosystem: "pip"
    directory: "/"
    open-pull-requests-limit: 3
    schedule:
      interval: "daily"
    cooldown:
      default-days: 14
