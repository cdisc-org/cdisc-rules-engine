# Variable: AVISIT
# Rule: Subject does not have all visit entries
# verified
Authorities:
  - Organization: CDISC
    Standards:
      - Name: ADaMIG
        References:
          - Citations:
              - Cited Guidance: Custom Rule
                Document: Custom Rule
                Item: Custom Rule
                Section: Custom Rule
            Origin: ADaM Conformance Rules
            Rule Identifier:
              Id: "111"
              Version: "2"
            Version: "5.0"
        Version: "1.3"
Check:
  all:
    - name: $visits_per_subject
      operator: not_contains_all
      value: $all_visits
Core:
  Id: Visits Check Custom Rule | Visit Completeness
  Status: Draft
  Version: "1"
Description: Raise error when subject does not have all visit entries
Executability: Fully Executable
Operations:
  - operator: distinct
    name: AVISIT
    id: $all_visits
    group:
      - PARAM
  - operator: distinct
    name: AVISIT
    id: $visits_per_subject
    group:
      - USUBJID
      - PARAM
  - operator: minus
    id: $missing_visits
    name: $all_visits
    subtract: $visits_per_subject
Outcome:
  Message: Subject does not have all visit entries
  Output Variables:
    - $missing_visits
    - PARAM
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ADEG
  Domains:
    Include:
      - ADEG
Sensitivity: Group
Grouping_Variables:
  - USUBJID
  - PARAM
